modLoader="javafml"
loaderVersion="[47,)"
license="MIT"
issueTrackerURL="https://github.com/egop1/EasyRecipes/issues"

[[mods]]
modId="easyrecipes"
version="${file.jarVersion}"
displayName="Easy Recipes (KubeJS)"
authors="EGOP1"
logoFile="icon.png"
displayURL="https://github.com/egop1/EasyRecipes"
description='''
Make recipes in-game instead of writing JavaScript by hand.

Run /easyrecipes to open the editor: pick a station, drag items into the slots, press Save.
The mod writes the KubeJS script for you and reloads it -- no files, no syntax errors, no
restart. You can also enter an existing recipe id and override it.

Vanilla stations: crafting table (shaped and shapeless), furnace, blast furnace, smoker,
campfire, stonecutter, smithing table.

Create stations (need both Create and the KubeJS Create addon): crushing wheels, millstone,
mechanical press, mechanical saw, encased fan (smelting, blasting, washing, haunting), sandpaper
polishing, deployer, spout, item drain, mechanical mixer, compacting, mechanical crafter. Machines
with random results let you build a weighted output list with per-item chances.

Requires KubeJS -- the generated scripts do nothing without it.
'''

[[dependencies.easyrecipes]]
    modId="forge"
    mandatory=true
    versionRange="[47,)"
    ordering="NONE"
    side="BOTH"

[[dependencies.easyrecipes]]
    modId="minecraft"
    mandatory=true
    versionRange="[1.20.1,1.21)"
    ordering="NONE"
    side="BOTH"

# The generated .js scripts do nothing without KubeJS present at runtime.
[[dependencies.easyrecipes]]
    modId="kubejs"
    mandatory=true
    versionRange="[2001,)"
    ordering="AFTER"
    side="BOTH"

# Optional: the Create stations are hidden unless BOTH of these are present. Create supplies the
# machines, kubejs_create supplies the event.recipes.createX(...) calls the generated script makes.
[[dependencies.easyrecipes]]
    modId="create"
    mandatory=false
    versionRange="[0.5.1,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.easyrecipes]]
    modId="kubejs_create"
    mandatory=false
    versionRange="*"
    ordering="AFTER"
    side="BOTH"
